name: Build Android APK

on:
  push:
    branches: [ main, master ]
 工作流调度:

作业:
  构建APK:
    运行环境: ubuntu-latest
    步骤:
      - 使用: actions/checkout@v4

      - 名称: 设置 Java
        使用: actions/setup-java@v4
        使用:
          发行版: 'temurin'
          Java版本: '17'

      - 名称: 安装依赖
        运行: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool pkg-config autoconf automake zip unzip libncurses5 libncursesw5
          pip3 install --user --upgrade buildozer cython

      - name: 使用 Buildozer 构建 APK
        运行: |
          export PATH=$PATH:~/.local/bin
          buildozer android debug
        环境:
          BUILDOZER_WARN_ON_ROOT: 1

      - 名称: 查找APK
        运行: find . -name "*.apk" -type f

      - 名称: 上传APK
        使用: actions/upload-artifact@v4
        使用:
          名称: 考试练习APK
          路径: "**/*debug*.apk"
